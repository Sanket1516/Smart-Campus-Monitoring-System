services:
  mongodb:
    image: mongo:7
    container_name: smart-campus-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - campus-network
    environment:
      MONGO_INITDB_DATABASE: smart_campus
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: smart-campus-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - campus-network
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-campus-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - campus-network
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongodb:27017/smart_campus
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: gemma:2b
      AI_TIMEOUT_MS: 1800
      CLIENT_URL: http://localhost
      TZ: Asia/Kolkata
      # FP_SECRET should be set in ./backend/.env for security
      # ENROLLMENT_TERMINAL_IP should be set in ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-campus-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - campus-network

networks:
  campus-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  ollama-data:
    driver: local
