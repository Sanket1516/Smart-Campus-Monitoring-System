version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: smart-campus-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - campus-network
    environment:
      MONGO_INITDB_DATABASE: smart_campus

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-campus-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - campus-network
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/smart_campus
      JWT_SECRET: change_this_to_a_secure_secret
      JWT_EXPIRE: 24h

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-campus-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - campus-network

networks:
  campus-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
